services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crypto-analyzer-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-crypto_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crypto_password}
      POSTGRES_DB: ${DB_NAME:-crypto_analyzer}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crypto_user} -d ${DB_NAME:-crypto_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: crypto-analyzer-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - monitoring-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: crypto-analyzer-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring-network

  # Loki for log aggregation
  loki:
    image: grafana/loki:latest
    container_name: crypto-analyzer-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - monitoring-network

  # Promtail for log collection
  promtail:
    image: grafana/promtail:latest
    container_name: crypto-analyzer-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - monitoring-network

  # Go Application
  app:
    image: huy289cb/crypto-analyzer-backend:latest
    container_name: crypto-analyzer-app-prod
    environment:
      # Database (connect directly to PostgreSQL)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-crypto_user}
      DB_PASSWORD: ${DB_PASSWORD:-crypto_password}
      DB_NAME: ${DB_NAME:-crypto_analyzer}
      DB_SSLMODE: disable
      
      # Server
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
      GIN_MODE: release
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      
      # Groq API
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_API_KEY_1: ${GROQ_API_KEY_1}
      GROQ_API_KEY_2: ${GROQ_API_KEY_2}
      
      # Binance API
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
      BINANCE_TESTNET_API_KEY: ${BINANCE_TESTNET_API_KEY}
      BINANCE_TESTNET_API_SECRET: ${BINANCE_TESTNET_API_SECRET}
      BINANCE_ENABLED: ${BINANCE_ENABLED:-false}
      BINANCE_BASE_URL: ${BINANCE_BASE_URL:-https://demo-fapi.binance.com}
      BINANCE_SYMBOL: ${BINANCE_SYMBOL:-BTCUSDT}
      BINANCE_LEVERAGE: ${BINANCE_LEVERAGE:-20}
      
      # Analysis
      ICT_CONFIDENCE_THRESHOLD: ${ICT_CONFIDENCE_THRESHOLD:-0.70}
      KIM_NGHIA_CONFIDENCE_THRESHOLD: ${KIM_NGHIA_CONFIDENCE_THRESHOLD:-0.75}
      AUTO_ENTRY_CONFIDENCE_THRESHOLD: ${AUTO_ENTRY_CONFIDENCE_THRESHOLD:-0.80}
      
      # Trading
      RISK_PERCENT: ${RISK_PERCENT:-0.01}
      MIN_RR_RATIO: ${MIN_RR_RATIO:-2.0}
      MIN_SL_DISTANCE: ${MIN_SL_DISTANCE:-0.0075}
      COOLDOWN_HOURS: ${COOLDOWN_HOURS:-4}
      
      # Scheduler
      ENABLE_KIM_NGHIA_SCHEDULER: ${ENABLE_KIM_NGHIA_SCHEDULER:-true}
      ENABLE_ICT_SCHEDULER: ${ENABLE_ICT_SCHEDULER:-false}
      ENABLE_PRICE_UPDATE_SCHEDULER: ${ENABLE_PRICE_UPDATE_SCHEDULER:-true}
      
      # Timezone
      TIMEZONE: UTC
      DISPLAY_TIMEZONE: Asia/Ho_Chi_Minh
      
      # Paper Trading
      PAPER_TRADING_ENABLED: ${PAPER_TRADING_ENABLED:-true}
      STARTING_BALANCE: ${STARTING_BALANCE:-100}
      
      # Testnet
      TESTNET_ENABLED: ${TESTNET_ENABLED:-false}
      TESTNET_URL: ${TESTNET_URL:-https://testnet.binance.vision}
      
      # BTC-only mode
      ENABLED_SYMBOLS: ${ENABLED_SYMBOLS:-BTC}
      
      # Price updates
      PRICE_UPDATE_INTERVAL_MS: ${PRICE_UPDATE_INTERVAL_MS:-30000}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend-network
      - monitoring-network

networks:
  backend-network:
    driver: bridge
  monitoring-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
