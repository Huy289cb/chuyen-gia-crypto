global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'crypto-analyzer'

scrape_configs:
  - job_name: 'crypto-analyzer-app'
    static_configs:
      - targets: ['app:3000']
        labels:
          service: 'crypto-analyzer'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alerts/*.yml"
